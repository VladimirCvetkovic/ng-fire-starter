<div class="page-header d-flex align-items-center gap-3" *transloco="let t; read: 'auth.header'">
  <button class="bg-transparent border-0 fs-xl p-0 pe-1 lh-1 text-muted cursor-pointer flex-shrink-0"
    type="button" (click)="backClick.emit()" [attr.aria-label]="t('back')">
    <shared-icon name="chevron-left" [size]="20" />
  </button>
  <h2 class="font-display fw-bold text-body fs-xl">{{ title() }}</h2>
</div>
@if (subtitle()) {
  <p class="sub-text font-body text-muted fs-sm">{{ subtitle() }}</p>
}
