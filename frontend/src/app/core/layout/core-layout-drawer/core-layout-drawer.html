@if (drawerSvc.config(); as cfg) {
  <div *transloco="let t; read: 'layout.drawer'">
    <div class="drawer-backdrop" (click)="drawerSvc.close()" aria-hidden="true"></div>
    <div class="drawer d-flex flex-column" role="dialog" aria-modal="true" [attr.aria-label]="cfg.title" tabindex="-1" #drawerPanel>
      <div class="drawer-header d-flex align-items-center gap-3 border-bottom flex-shrink-0">
        <button class="back-btn d-flex align-items-center justify-content-center flex-shrink-0" (click)="drawerSvc.close()" [attr.aria-label]="t('close')">
          <shared-icon name="chevron-left" [size]="20" />
        </button>
        <div class="drawer-titles flex-1 min-w-0">
          <p class="drawer-title font-display fw-bold text-body text-truncate">{{ cfg.title }}</p>
          @if (cfg.subtitle) {
            <p class="drawer-subtitle font-body text-faint">{{ cfg.subtitle }}</p>
          }
        </div>
      </div>
      <div class="drawer-body flex-1 overflow-auto">
        @if (cfg.component) {
          <ng-container
            [ngComponentOutlet]="cfg.component"
            [ngComponentOutletInputs]="cfg.inputs ?? {}" />
        } @else if (cfg.template) {
          <ng-container [ngTemplateOutlet]="cfg.template" />
        }
      </div>
    </div>
  </div>
}
