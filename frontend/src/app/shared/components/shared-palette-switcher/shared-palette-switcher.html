<div class="palette-switcher" role="group" *transloco="let t; read: 'ui.palette'" [attr.aria-label]="t('ariaLabel')">
  @for (option of options; track option.value) {
    <button
      type="button"
      class="palette-btn"
      [class.active]="currentPalette() === option.value"
      [attr.data-palette-swatch]="option.value"
      [attr.aria-label]="t(option.labelKey)"
      [attr.aria-pressed]="currentPalette() === option.value"
      (click)="setPalette(option.value)">
    </button>
  }
</div>
